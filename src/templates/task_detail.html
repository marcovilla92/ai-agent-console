{% extends "base.html" %}

{% block title %}Task #{{ task_id }} - AI Agent Console{% endblock %}

{% block content %}
<div x-data="taskDetail({{ task_id }})" x-init="init()">

  <a href="/">&larr; Back to Tasks</a>

  <hgroup>
    <h2 x-text="task.name || 'Loading...'"></h2>
    <p>
      Status: <span x-text="task.status" x-bind:data-status="task.status"></span>
      &middot; Mode: <span x-text="task.mode"></span>
      &middot; Created: <span x-text="task.created_at"></span>
    </p>
  </hgroup>

  <blockquote x-show="task.prompt" x-text="task.prompt"></blockquote>

  <!-- Action buttons -->
  <div>
    <button @click="cancelTask()" x-show="task.status === 'running' || task.status === 'queued'" class="secondary">Cancel</button>
  </div>

  <!-- Approval UI -->
  <template x-if="approvalPending">
    <article>
      <header>Approval Required</header>
      <pre x-text="approvalContext"></pre>
      <footer>
        <div role="group">
          <button @click="sendApproval('approve')">Approve</button>
          <button @click="sendApproval('reject')" class="secondary">Reject</button>
          <button @click="sendApproval('continue')" class="contrast">Continue</button>
        </div>
      </footer>
    </article>
  </template>

  <!-- Streaming log output -->
  <h3>Live Output</h3>
  <pre class="log-output" x-ref="logContainer"><code x-text="logText"></code></pre>

  <!-- Agent output history -->
  <h3 x-show="agentOutputs.length > 0">Agent Steps</h3>
  <template x-for="output in agentOutputs" :key="output.id">
    <details>
      <summary x-text="output.agent_type"></summary>
      <pre x-text="output.raw_output"></pre>
    </details>
  </template>

</div>

{% raw %}
<script>
function taskDetail(taskId) {
  return {
    task: {},
    logText: '',
    approvalPending: false,
    approvalContext: '',
    agentOutputs: [],
    ws: null,

    async init() {
      await this.loadTask();
      await this.loadOutputs();
      this.connectWS();
    },

    async loadTask() {
      const resp = await fetch(`/tasks/${taskId}`, {credentials: 'same-origin'});
      if (resp.ok) this.task = await resp.json();
    },

    async loadOutputs() {
      const resp = await fetch(`/tasks/${taskId}/outputs`, {credentials: 'same-origin'});
      if (resp.ok) {
        const data = await resp.json();
        this.agentOutputs = data.outputs;
      }
    },

    connectWS() {
      let token = sessionStorage.getItem('ws_token');
      if (!token) {
        const user = prompt('Username:');
        const pass = prompt('Password:');
        token = btoa(user + ':' + pass);
        sessionStorage.setItem('ws_token', token);
      }
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${proto}//${location.host}/ws/tasks/${taskId}?token=${token}`;
      this.ws = new WebSocket(url);

      this.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'chunk') {
          this.logText += msg.data;
          this.$nextTick(() => {
            this.$refs.logContainer.scrollTop = this.$refs.logContainer.scrollHeight;
          });
        } else if (msg.type === 'status') {
          this.task.status = msg.data;
          if (['completed', 'failed', 'cancelled'].includes(msg.data)) {
            this.loadTask();
            this.loadOutputs();
          }
        } else if (msg.type === 'approval_required') {
          this.approvalPending = true;
          this.approvalContext = typeof msg.data === 'string' ? msg.data : JSON.stringify(msg.data, null, 2);
        }
        // Ignore "ping" type
      };

      this.ws.onclose = () => {
        setTimeout(() => {
          if (this.task.status === 'running' || this.task.status === 'queued' || this.task.status === 'awaiting_approval') {
            this.connectWS();
          }
        }, 3000);
      };
    },

    async sendApproval(decision) {
      await fetch(`/tasks/${taskId}/approve`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin',
        body: JSON.stringify({decision})
      });
      this.approvalPending = false;
    },

    async cancelTask() {
      await fetch(`/tasks/${taskId}/cancel`, {
        method: 'POST',
        credentials: 'same-origin'
      });
      this.loadTask();
    }
  }
}
</script>
{% endraw %}
{% endblock %}
